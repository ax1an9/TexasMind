services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  agent:
    build: ./poker-agent
    ports:
      - "9090:9090"
    volumes:
      - agent-data:/app/data
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-mimo-v2.5-pro}
      - LLM_API_KEY=${LLM_API_KEY:-tp-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}

  backend:
    build:
      context: .
      dockerfile: poker-server/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - agent
    command:
      - "--agent.type=grpc"
      - "--agent.grpc.host=agent"
      - "--agent.grpc.port=9090"

  frontend:
    build: ./poker-web
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  agent-data:
  mongo-data:
